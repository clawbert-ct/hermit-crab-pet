    <ellipse cx="200" cy="110" rx="95" ry="30" stroke="#C52025" stroke-width="2" fill="none" opacity="0.8"/>
    <ellipse cx="200" cy="110" rx="90" ry="28" fill="#E62F2B"/>
    <ellipse cx="200" cy="110" rx="70" ry="22" stroke="#B0121F" stroke-width="2" fill="none" opacity="0.6"/>
    <ellipse cx="200" cy="110" rx="66" ry="20" fill="#F03A3E"/>
    <path d="M 120 95 A 90 25 0 0 1 280 95" stroke="#FFFFFF" stroke-width="4" fill="none" opacity="0.4" stroke-linecap="round"/>
    <!-- SODA text -->
    <g transform="translate(200, 115) scale(1, 0.35)">
      <text x="0" y="15" font-family="Arial, sans-serif" font-size="48" font-weight="900" fill="#FFFFFF" text-anchor="middle" opacity="0.9">SODA</text>
    </g>
  </g>

  <!-- Hermit Crab -->
  <g id="crab">
