<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="top-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#F95C60"/>
      <stop offset="50%" stopColor="#E62F2B"/>
      <stop offset="100%" stopColor="#9A1015"/>
    </linearGradient>
    <linearGradient id="skirt-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stopColor="#700A0E"/>
      <stop offset="15%" stopColor="#C52025"/>
      <stop offset="50%" stopColor="#F24B4E"/>
      <stop offset="85%" stopColor="#C52025"/>
      <stop offset="100%" stopColor="#500508"/>
    </linearGradient>
    <linearGradient id="crab-body-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stopColor="#2A0508"/>
      <stop offset="40%" stopColor="#9A2312"/>
      <stop offset="100%" stopColor="#D9552C"/>
    </linearGradient>
  </defs>

  <!-- Bottle Cap Shell -->
  <g id="bottle-cap">
    <ellipse cx="200" cy="190" rx="118" ry="45" fill="#2A0508" />
    <path d="M 90 110 L 78 190 A 122 47 0 0 1 322 190 L 310 110 A 110 35 0 0 0 90 110 Z" fill="url(#skirt-gradient)" />
    <!-- Ridges -->
    <g opacity="0.7">
      <line x1="93" y1="125" x2="80" y2="190" stroke="#A0151A" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="103" y1="130" x2="90" y2="190" stroke="#A0151A" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="113" y1="135" x2="100" y2="190" stroke="#A0151A" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="123" y1="140" x2="110" y2="190" stroke="#A0151A" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="133" y1="145" x2="120" y2="190" stroke="#A0151A" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="143" y1="148" x2="130" y2="190" stroke="#A0151A" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="153" y1="150" x2="140" y2="190" stroke="#A0151A" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="163" y1="151" x2="150" y2="190" stroke="#A0151A" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="173" y1="151" x2="160" y2="190" stroke="#A0151A" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="183" y1="150" x2="170" y2="190" stroke="#A0151A" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="193" y1="149" x2="180" y2="190" stroke="#A0151A" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="203" y1="148" x2="190" y2="190" stroke="#A0151A" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="213" y1="147" x2="200" y2="190" stroke="#A0151A" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="223" y1="145" x2="210" y2="190" stroke="#A0151A" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="233" y1="142" x2="220" y2="190" stroke="#A0151A" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="243" y1="139" x2="230" y2="190" stroke="#A0151A" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="253" y1="135" x2="240" y2="190" stroke="#A0151A" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="263" y1="130" x2="250" y2="190" stroke="#A0151A" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="273" y1="125" x2="260" y2="190" stroke="#A0151A" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="283" y1="120" x2="270" y2="190" stroke="#A0151A" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="293" y1="115" x2="280" y2="190" stroke="#A0151A" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="303" y1="110" x2="290" y2="190" stroke="#A0151A" stroke-width="2.5" stroke-linecap="round"/>
    </g>
    <!-- Glossy highlight -->
    <path d="M 170 135 L 170 215" stroke="#FFFFFF" stroke-width="12" fill="none" opacity="0.15" stroke-linecap="round"/>
    <path d="M 170 145 L 170 205" stroke="#FFFFFF" stroke-width="4" fill="none" opacity="0.3" stroke-linecap="round"/>
    <!-- Cap top -->
