// Updated drawShellPreview using the new spiral shells
function drawShellPreview(x, y, tier, scale) {
  ctx.save();
  ctx.translate(x, y);
  
  // Try shell image first (now ALL tiers have empty shells in shellImages)
  if (typeof shellImages !== 'undefined' && shellImages[tier] && shellImages[tier].complete) {
    // Figma PNGs are 794x1123 (portrait). Scale based on height.
    const imgH = shellImages[tier].naturalHeight || shellImages[tier].height || 1123;
    const imgW = shellImages[tier].naturalWidth || shellImages[tier].width || 794;
    const imgScale = scale * 200 / imgH;  // Scale to ~200px tall at scale=1
    ctx.scale(imgScale, imgScale);
    ctx.drawImage(shellImages[tier], -imgW/2, -imgH, imgW, imgH);
    ctx.restore();
    return;
  }
  
  // Fallback: canvas drawing (also used for tier 0 to avoid ghost crab)
  if (tier === 0) {
    drawBottleCap(ctx, scale * 0.6);
  } else {
    drawAmberConch(ctx, scale * 0.45);
  }
  
  ctx.restore();
}

function drawBgCrab(crab) {
  ctx.save();
  ctx.translate(crab.x, crab.y);
  ctx.scale(crab.facing * crab.size, crab.size);
  
  const walkBob = Math.sin(crab.walkFrame * 0.12) * 1;
  
  // Tiny shell — use canvas drawing for all bg crabs to avoid ghosting
  // (PNGs for tiers 0/5/6 include the crab body, which causes double-crab)
  if (crab.shellTier === 0) {
    // Tier 0 bottle cap
    drawBottleCap(ctx, 0.07);
  } else if (crab.shellTier >= 0) {
    // Tiers 1-6: colored ellipse fallback for bg crabs (cleaner than PNG with embedded crab)
    const shellData = SHELL_TIERS[crab.shellTier];
    ctx.beginPath();
    ctx.ellipse(0, -3, 14, 10, 0, 0, Math.PI * 2);
    ctx.fillStyle = shellData.color;
    ctx.fill();
    ctx.strokeStyle = shellData.accent;
    ctx.lineWidth = 1;
    ctx.stroke();
  } else {
    // No shell — vulnerable, soft body exposed
    ctx.beginPath();
    ctx.ellipse(0, -2, 10, 8, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(180, 120, 90, 0.4)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(150, 100, 70, 0.3)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }
  
  // Body
  ctx.beginPath();
  ctx.ellipse(0, 5, 7, 5 + walkBob, 0, 0, Math.PI * 2);
  ctx.fillStyle = crab.color;
  ctx.fill();
  
  // Legs (simplified)
  ctx.strokeStyle = crab.color;
  ctx.lineWidth = 1.5;
  for (let i = 0; i < 3; i++) {
    const side = i < 2 ? -1 : 1;
    const lx = side * (6 + i * 3);
    const ly = 6 + i * 2;
    const walkOffset = Math.sin(crab.walkFrame * 0.15 + i) * 2;
    ctx.beginPath();
    ctx.moveTo(lx, ly);
    ctx.lineTo(lx + side * 8 + walkOffset, ly + 8);
    ctx.stroke();
  }
  
  // Eye stalks (tiny)
  ctx.beginPath();
  ctx.moveTo(-3, -2);
  ctx.lineTo(-4, -9 + walkBob);
  ctx.strokeStyle = 'rgba(180, 80, 50, 0.7)';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(-4, -10 + walkBob, 1.5, 0, Math.PI * 2);
  ctx.fillStyle = '#222';
  ctx.fill();
  
  ctx.beginPath();
  ctx.moveTo(3, -2);
  ctx.lineTo(5, -8 + walkBob);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(5, -9 + walkBob, 1.5, 0, Math.PI * 2);
  ctx.fillStyle = '#222';
  ctx.fill();
  
  // If this crab just received a shell, show sparkles
  if (crab.phase === 'receiving' && crab.receivedShell) {
    const sparkAlpha = 0.4 + Math.sin(state.time * 0.1) * 0.3;
    ctx.beginPath();
    ctx.arc(0, 0, 20, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 215, 0, ${sparkAlpha * 0.15})`;
    ctx.fill();
  }
  
  ctx.restore();
}

function drawVacancyShells() {
  state.vacancyShells.forEach((vs, idx) => {
    if (vs.phase === 'drifting') {
      // Shell drifts from main crab position to the meeting point
      vs.x += (vs.targetX - vs.x) * vs.driftSpeed;
      vs.y += (vs.targetY - vs.y) * vs.driftSpeed;
      vs.bobPhase += 0.04;
      const bob = Math.sin(vs.bobPhase) * 2;
      
      // Draw the drifting shell
      ctx.save();
      ctx.translate(vs.x, vs.y + bob);
      ctx.globalAlpha = 0.8;
      drawShellPreview(0, 0, vs.tier, 1.0);
      ctx.globalAlpha = 1;
      ctx.restore();
      
      // Sparkle trail
      vs.sparkles.push({
        x: vs.x + (Math.random() - 0.5) * 10,
        y: vs.y + (Math.random() - 0.5) * 10,
        life: 1,
        size: 1 + Math.random() * 2
      });
      
      // Check if it reached target
      if (Math.abs(vs.x - vs.targetX) < 5 && Math.abs(vs.y - vs.targetY) < 5) {
        vs.phase = 'received';
        // Give shell to first waiting bg crab
        const receiver = state.bgCrabs.find(c => c.phase === 'approaching');
        if (receiver) {
          receiver.phase = 'receiving';
          receiver.receivedShell = SHELL_TIERS[vs.tier];
          receiver.shellTier = vs.tier;
          receiver.departureTimer = 0;
        }
      }
    }
    
    // Draw sparkle trail
    vs.sparkles = vs.sparkles.filter(s => {
      s.life -= 0.03;
      if (s.life <= 0) return false;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size * s.life, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 215, 0, ${s.life * 0.5})`;
      ctx.fill();
      return true;
    });
  });
}

function updateVacancyChain() {
  if (!state.vacancyChainActive) return;
  state.vacancyChainTimer++;
  
  // Just drift the old shell off screen with sparkles
  state.vacancyShells.forEach(vs => {
    if (vs.phase === 'drifting') {
      const dx = vs.targetX - vs.x;
      if (Math.abs(dx) > 3) {
        vs.x += dx * 0.008; // Gentle drift
        vs.bobPhase += 0.05;
      } else {
        vs.phase = 'gone';
      }
    }
  });
  
  // Clean up gone shells
  state.vacancyShells = state.vacancyShells.filter(vs => vs.phase !== 'gone');
  
  // End vacancy chain when shell has left OR after safety timeout
  if (state.vacancyShells.length === 0 || state.vacancyChainTimer > 300) {
    state.vacancyChainActive = false;
    state.bgCrabs = [];
    state.vacancyShells = [];
  }
}

// ---- CELEBRATION BURST (golden sparkles on shell upgrade!) ----
function drawCelebrationBurst(ctx) {
  const cb = state.celebrationBurst;
  cb.timer++;
  if (cb.timer > cb.duration) {
    state.celebrationBurst = null;
    return;
  }
  const progress = cb.timer / cb.duration; // 0 → 1
  const alpha = progress < 0.6 ? 1 : 1 - (progress - 0.6) / 0.4;
  ctx.save();
  ctx.globalAlpha = alpha;
  // Burst of golden stars/sparkles radiating outward
  for (let i = 0; i < 12; i++) {
    const angle = (i / 12) * Math.PI * 2 + progress * 0.5;
    const dist = progress * 60;
    const sx = cb.x + Math.cos(angle) * dist;
    const sy = cb.y + Math.sin(angle) * dist * 0.6; // Squished oval
    const size = (1 - progress) * 5 + 1;
    ctx.font = `${Math.floor(size * 2)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // Alternate between stars and sparkles
    ctx.fillText(i % 2 === 0 ? '✨' : '⭐', sx, sy);
  }
  // Central flash at the start
  if (progress < 0.15) {
    const flashAlpha = 1 - progress / 0.15;
    ctx.beginPath();
    ctx.arc(cb.x, cb.y, 40 * (1 - progress), 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 230, 150, ${flashAlpha * 0.4})`;
    ctx.fill();
  }
  ctx.restore();
}

// ---- FOUND ITEM POPUP ----
function drawFoundItemPopup(ctx) {
  if (!state.beach.lastFind) return;
  const elapsed = state.time - state.beach.lastFind.time;
  if (elapsed > 300) {
    state.beach.lastFind = null;
    return;
  }
  const item = state.beach.lastFind.item;
    const alpha = elapsed < 250 ? 1 : 1 - (elapsed - 250) / 50; // Fade out last 50 frames
  
  const rarityColors = {
    common: '#88aa88',
    uncommon: '#4488cc',
    rare: '#cc88ff',
    legendary: '#ffaa22'
  };
  const rarityGlow = {
    common: 'rgba(136, 170, 136, 0.3)',
    uncommon: 'rgba(68, 136, 204, 0.3)',
    rare: 'rgba(204, 136, 255, 0.3)',
    legendary: 'rgba(255, 170, 34, 0.4)'
  };
  
  const px = W / 2;
  const py = H * 0.3;
  const w = 260;
  const h = 90;
  
  ctx.save();
  ctx.globalAlpha = alpha;
  
  // Glow for rare/legendary
  if (item.rarity === 'rare' || item.rarity === 'legendary') {
    // Sparkle particles
    for (let i = 0; i < 12; i++) {
      const sx = px + (Math.random() - 0.5) * w * 1.5;
      const sy = py + (Math.random() - 0.5) * h * 2;
      const ss = 2 + Math.random() * 3;
      ctx.beginPath();
      ctx.arc(sx, sy, ss, 0, Math.PI * 2);
      ctx.fillStyle = rarityGlow[item.rarity];
      ctx.fill();
    }
  }
  
  // Background pill (rounded rect)
  ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
  ctx.beginPath();
  ctx.moveTo(px - w/2 + 10, py - h/2);
  ctx.lineTo(px + w/2 - 10, py - h/2);
  ctx.arcTo(px + w/2, py - h/2, px + w/2, py - h/2 + 10, 10);
  ctx.lineTo(px + w/2, py + h/2 - 10);
  ctx.arcTo(px + w/2, py + h/2, px + w/2 - 10, py + h/2, 10);
  ctx.lineTo(px - w/2 + 10, py + h/2);
  ctx.arcTo(px - w/2, py + h/2, px - w/2, py + h/2 - 10, 10);
  ctx.lineTo(px - w/2, py - h/2 + 10);
  ctx.arcTo(px - w/2, py - h/2, px - w/2 + 10, py - h/2, 10);
  ctx.closePath();
  ctx.fill();
  
  // Rarity border
  ctx.strokeStyle = rarityColors[item.rarity];
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(px - w/2 + 10, py - h/2);
  ctx.lineTo(px + w/2 - 10, py - h/2);
  ctx.arcTo(px + w/2, py - h/2, px + w/2, py - h/2 + 10, 10);
  ctx.lineTo(px + w/2, py + h/2 - 10);
  ctx.arcTo(px + w/2, py + h/2, px + w/2 - 10, py + h/2, 10);
  ctx.lineTo(px - w/2 + 10, py + h/2);
  ctx.arcTo(px - w/2, py + h/2, px - w/2, py + h/2 - 10, 10);
  ctx.lineTo(px - w/2, py - h/2 + 10);
  ctx.arcTo(px - w/2, py - h/2, px - w/2 + 10, py - h/2, 10);
  ctx.closePath();
  ctx.stroke();
  
  // Item name
  ctx.fillStyle = rarityColors[item.rarity];
  ctx.font = 'bold 18px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Found! ' + item.name, px, py - 8);
  
  // Rarity label
  ctx.font = 'bold 13px sans-serif';
  ctx.fillStyle = '#ccc';
  ctx.fillText(item.rarity.toUpperCase(), px, py + 16);
  
  ctx.restore();
}

// ---- ANIMATION LOOP ----
function animate() {
  state.time++;
  
  // Pet cooldown countdown
  if (petCooldown > 0) petCooldown--;
  if (petAnimTimer > 0) petAnimTimer--;
  
  // Crab doesn't wander during shell assessment
  if (!state.shell.upgrading && !isInspecting && !isDigging && Math.random() < 0.003) {
    crabTargetX = W * 0.15 + Math.random() * W * 0.65;
    crabTargetY = H * 0.40 + Math.random() * H * 0.12; // Stay on visible sand
    // Clamp crab position to visible area
    crabX = Math.max(W * 0.1, Math.min(W * 0.85, crabX));
    crabY = Math.max(H * 0.30, Math.min(H * 0.60, crabY));
  }
  
  // Move toward target (not during assessment; if digPending, stop when close and start digging)
  if (!state.shell.upgrading && !isDigging) {
    const dx = crabTargetX - crabX;
    const dy = crabTargetY - crabY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > 5) {
      // Walk faster toward dig spot - scuttle scuttle!
      const speed = state.digPending ? 0.08 : 0.005;
      crabX += dx * speed;
      crabY += dy * speed;
      crabFacing = dx > 0 ? 1 : -1;
      crabWalkFrame++;
    } else if (state.digPending) {
      // Arrived at dig spot — start digging!
      state.digPending = false;
      isDigging = true;
      digTimer = 70;
      digSpotX = crabX;
      digSpotY = crabY;
      SFX.dig();
      // 15% chance of treasure!
      if (Math.random() < 0.15) {
        const item = trySpawnCollectible();
        if (!state.beach.foundItems) state.beach.foundItems = [];
        const existing = state.beach.foundItems.find(fi => fi.name === item.name);
        if (existing) existing.count = (existing.count || 1) + 1;
        else state.beach.foundItems.push({...item, count: 1});
        // Also show it on the beach!
        if (!state.beach.collectibles) state.beach.collectibles = [];
        state.beach.collectibles.push({ id: item.id, x: crabX, y: crabY, spawnTime: state.time });
        if (state.beach.collectibles.length > 5) state.beach.collectibles.shift();
        state.beach.lastFind = { item, time: state.time, x: crabX, y: crabY };
        state.stats.happiness = Math.min(100, state.stats.happiness + (item.rarity === 'legendary' ? 15 : item.rarity === 'rare' ? 8 : item.rarity === 'uncommon' ? 3 : 1));
      }
      state.stats.happiness = Math.min(100, state.stats.happiness + 2);
    }
  }
  
  // Digging animation — sand sprays sideways from under the crab (not puking!)
  if (isDigging) {
    digTimer--;
    if (digTimer <= 0) {
      isDigging = false;
      // Leave a little dig hole right where the crab was digging!
      state.beach.digMarks = state.beach.digMarks || [];
      if (state.beach.digMarks.length < 5) {
        state.beach.digMarks.push({ x: digSpotX, y: digSpotY, age: 0 });
      }
    } else {
      // Spawn sand particles every 4 frames — spray sideways from under the crab
      if (digTimer % 4 === 0) {
        // Sand spray offset — from the leg/sand area, varies by shell tier
        const yOffset = state.shell.tier === 0 ? 12 : state.shell.tier === 1 ? 10 : 8;
        for (let i = 0; i < 4; i++) {
          const sideDir = (i < 2 ? -1 : 1);
          digParticles.push({
            x: digSpotX + sideDir * (3 + Math.random() * 6),
            y: digSpotY + yOffset + Math.random() * 3, // Just below body, legs/sand area
            vx: sideDir * (1.5 + Math.random() * 2), // Spray sideways!
            vy: 0.2 + Math.random() * 0.5, // Barely upward, mostly out
            life: 14 + Math.random() * 6,
            size: 1.5 + Math.random() * 2,
            color: Math.random() > 0.4 ? '#c4a882' : '#b89860'
          });
        }
        // Tiny upward spray
        digParticles.push({
          x: digSpotX + (Math.random() - 0.5) * 8,
          y: digSpotY + yOffset - 2,
          vx: (Math.random() - 0.5) * 2,
          vy: -0.3 - Math.random() * 0.3, // Very subtle
          life: 6 + Math.random() * 4,
          size: 0.6 + Math.random() * 0.6,
          color: '#d4b896'
        });
      }
    }
  }
  // Update dig particles
  digParticles = digParticles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15; // gravity
    p.life--;
    return p.life > 0;
  });

  // Shell inspection
  if (isInspecting) {
    inspectProgress += 0.02;
    if (inspectProgress >= 1) {
      isInspecting = false;
    }
  }
  
  // Crab eats nearby food
  if (state.foodItems.length > 0 && !isInspecting) {
    const nearestFood = state.foodItems.find(f => !f.eating);
    if (nearestFood) {
      const fx = nearestFood.x - crabX;
      const fy = nearestFood.y - crabY;
      const foodDist = Math.sqrt(fx * fx + fy * fy);
      if (foodDist < 25) {
        // Close enough to eat! Crab pauses and munches
        nearestFood.eating = true;
        // Slow crab movement while eating
        crabWalkFrame += 0.2;
      } else if (foodDist < 100) {
        // Walk toward food (slightly faster when hungry!)
        crabTargetX = nearestFood.x;
        crabTargetY = nearestFood.y;
      }
    }
  }
  
  // Slow stat decay and overgrowth
  if (state.time % 180 === 0) { // ~3 seconds
    state.stats.hunger = Math.max(0, state.stats.hunger - 1);
    state.stats.happiness = Math.max(0, state.stats.happiness - 1);
    // Beach slowly gets dirty
    state.beach.cleanliness = Math.max(0, state.beach.cleanliness - 1);
    // Low hunger = health penalty
    if (state.stats.hunger < 20) {
      state.stats.health = Math.max(0, state.stats.health - 1);
    }
    // Anemone glow slowly returns to baseline
    if (state.anemone) {
      state.anemone.glow = Math.max(0, (state.anemone.glow || 0) - 0.05);
    }
    updateUI();
  }
  // Overgrowth grows over time (every ~5 seconds)
  if (state.time % 1800 === 0 && state.beach.overgrowth.length < 5) {
    const patch = {
      x: W * 0.15 + Math.random() * W * 0.45,
      y: H * 0.45 + Math.random() * H * 0.10,
      size: 14 + Math.random() * 10,
      angle: Math.random() * Math.PI,
      spawnTime: state.time
    };
    state.beach.overgrowth.push(patch);
    state.beach.cleanliness = Math.max(0, state.beach.cleanliness - 3);
  }
  // Existing overgrowth slowly grows (up to 30px)
  if (state.time % 3600 === 0) {
    state.beach.overgrowth.forEach(patch => {
      patch.size = Math.min(30, patch.size + 2);
    });
  }
  // Dirty beach = unhappy crab
  if (state.beach.cleanliness < 30) {
    state.stats.happiness = Math.max(0, state.stats.happiness - 0.01);
  }
  // Kelp grows NATURALLY when beach is clean (not from cleaning!)
  // 1 kelp stalk every ~50 seconds at 70%+
  if (state.beach.cleanliness > 70 && state.beach.kelpGrowth < 3 && state.time % 3000 === 0) {
    state.beach.kelpGrowth++;
  }
  // Remove old food items
  state.foodItems = state.foodItems.filter(f => state.time - f.spawnTime < 3600);
  
  // Draw
  const tier = getDepthTier();
  try {
    ctx.clearRect(0, 0, W, H);
    drawHabitat(tier);
    // Algae grows on the sand floor — crab walks OVER it
    drawOvergrowth();
    // Draw dig marks — little holes in the sand where the crab dug!
    if (state.beach.digMarks && state.beach.digMarks.length > 0) {
      ctx.save();
      state.beach.digMarks.forEach(mark => {
        mark.age++;
        const alpha = Math.max(0, 1 - mark.age / 600); // Fade over ~10 seconds
        if (alpha <= 0) return;
        // Outer shadow — bigger!
        ctx.beginPath();
        ctx.ellipse(mark.x, mark.y + 10, 18, 9, 0, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(120, 100, 70, ${alpha * 0.4})`;
        ctx.fill();
        // Inner hole
        ctx.beginPath();
        ctx.ellipse(mark.x, mark.y + 10, 12, 6, 0, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(90, 75, 50, ${alpha * 0.55})`;
        ctx.fill();
        // Deepest center
        ctx.beginPath();
        ctx.ellipse(mark.x, mark.y + 10, 6, 3, 0, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(50, 40, 25, ${alpha * 0.5})`;
        ctx.fill();
        // Little sand pile to one side (hermit crabs scoop to one side!)
        ctx.beginPath();
        ctx.ellipse(mark.x + 14, mark.y + 15, 8, 4, 0.3, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(210, 190, 150, ${alpha * 0.45})`;
        ctx.fill();
      });
      // Clean up fully faded marks
      state.beach.digMarks = state.beach.digMarks.filter(m => m.age < 600);
      ctx.restore();
    }
    drawFoodItems();
    // Beach items (kelp, collectibles) draw BEFORE the crab so crab walks in front
    drawBeachItems();
    crabX = Math.max(W * 0.15, Math.min(W * 0.8, Number.isFinite(crabX) ? crabX : W * 0.45));
    crabY = Math.max(H * 0.32, Math.min(H * 0.60, Number.isFinite(crabY) ? crabY : H * 0.45));
    drawCompositedCrab(ctx, tier, state);
    // Dig animation — sand spray at ground level (not mouth level!)
    if (isDigging) {
      ctx.save();
      ctx.translate(crabX, crabY);
      // Position just below body where legs meet sand
      const sprayY = state.shell.tier === 0 ? 12 : state.shell.tier === 1 ? 10 : 8;
      for (let i = 0; i < 2; i++) {
        const sx = (Math.random() - 0.5) * 10;
        ctx.beginPath();
        ctx.arc(sx, sprayY, 1.5, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(196, 168, 130, ' + (0.2 + Math.random() * 0.2) + ')';
        ctx.fill();
      }
      ctx.restore();
    }
    // Beach items now drawn before crab (see above)
    // Pet animation — little floating hearts when you pet the crab!
    if (petAnimTimer > 0) {
      const petProgress = petAnimTimer / 20; // 1.0 → 0.0
      const heartY = crabY - 30 - (1 - petProgress) * 20; // Float upward
      const heartAlpha = petProgress; // Fade out
      ctx.save();
      ctx.font = `${16 + (1 - petProgress) * 8}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillStyle = `rgba(255, 100, 150, ${heartAlpha})`;
      ctx.fillText('❤', crabX, heartY);
      // Second heart offset
      if (petProgress > 0.3) {
        ctx.font = `${13 + (1 - petProgress) * 5}px sans-serif`;
        ctx.fillStyle = `rgba(255, 150, 180, ${heartAlpha * 0.7})`;
        ctx.fillText('❤', crabX + 15, heartY - 5);
      }
      ctx.restore();
    }
    // Sand dig particles
    if (digParticles.length > 0) {
      digParticles.forEach(p => {
        ctx.save();
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.globalAlpha = Math.min(1, p.life / 10);
        ctx.fill();
        ctx.restore();
      });
    }
    // Anemone draws inside drawCompositedCrab now

    // Draw vacancy chain (just drifting shells, no bg crabs)
    updateVacancyChain();
    // Draw washed-up shell (on top of everything!)
    drawPendingShell();
    drawVacancyShells();
    // Draw celebration burst (golden sparkles when shell upgrades!)
    if (state.celebrationBurst) drawCelebrationBurst(ctx);
    // Draw found item notification
    drawFoundItemPopup(ctx);
    // Draw collection modal on top of everything
    if (state.showBeachCollection) drawBeachCollectionModal(ctx);
    if (state.showCollection) drawCollectionModal(ctx);
  } catch(e) {
    // Emergency fallback — log the error
    console.error('Render error:', e);
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = "#E8785A";
    ctx.beginPath();
    ctx.arc(W * 0.45, H * 0.58, 20, 0, Math.PI * 2);
    ctx.fill();
  }
  
  // Inspection or shell upgrade overlay
  if (isInspecting) {
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillRect(W/2 - 50, H * 0.45, 100, 3);
  }
  
  // Shell upgrade assessment animation — 5-stage ritual
  if (state.shell.upgrading) {
    drawAssessmentAnimation(ctx, W, H, state, crabX, crabY);
  }
  
  requestAnimationFrame(animate);
}

// Ambient sound — occasional bubbles
let lastBubbleSound = 0;
function maybeAmbientBubble(t) {
  if (t - lastBubbleSound > 600 && Math.random() < 0.005) { // ~every 10-20s
    SFX.bubble();
    lastBubbleSound = t;
  }
}

// Start
updateUI();
animate();
</script>
